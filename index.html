<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Install XOANON Music</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#050816;
      color:white;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .card{
      width:100%;
      max-width:400px;
      background:#0d1328;
      border:1px solid rgba(255,255,255,0.08);
      border-radius:24px;
      padding:30px;
      text-align:center;
      box-shadow:0 0 40px rgba(0,0,0,0.4);
    }

    .logo{
      width:90px;
      height:90px;
      border-radius:24px;
      margin:auto;
      margin-bottom:20px;
      background:linear-gradient(135deg,#6d5dfc,#4a90ff);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:32px;
      font-weight:bold;
    }

    h1{
      font-size:28px;
      margin-bottom:10px;
    }

    p{
      color:#b7bfd6;
      font-size:15px;
      line-height:1.6;
      margin-bottom:28px;
    }

    .install-btn{
      display:block;
      width:100%;
      text-decoration:none;
      background:linear-gradient(135deg,#6d5dfc,#4a90ff);
      padding:16px;
      border-radius:14px;
      color:white;
      font-size:17px;
      font-weight:600;
      transition:0.3s;
    }

    .install-btn:hover{
      transform:scale(1.02);
      opacity:0.95;
    }

    .info{
      margin-top:20px;
      font-size:13px;
      color:#8f98b2;
    }
  </style>
</head>

<body>

  <div class="card">

    <div class="logo">
      X
    </div>

    <h1>XOANON Music</h1>

    <p>
      Install the official XOANON Music Android app directly on your device.
    </p>

    <!-- PUT YOUR APK FILE NAME HERE -->
    <a class="install-btn" href="./XOANON-Music.apk" download>
      Install APK
    </a>

    <div class="info">
      Android may ask permission to install unknown apps.
    </div>

  </div>

</body>
</html>
